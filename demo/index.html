<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@zakkster/lite-ambient-fx — Atmosphere Playground</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
          rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Phosphor palette — hex fallback first, oklch override second. */
            --bg: #020a04;
            --bg: oklch(0.14 0.02 155);
            --panel: rgba(6, 18, 12, 0.94);
            --panel: oklch(0.18 0.02 155 / 0.94);
            --border: rgba(120, 255, 180, 0.10);
            --border: oklch(0.9 0.14 155 / 0.10);
            --text: #d8f8e6;
            --text: oklch(0.94 0.06 155);
            --dim: #6ec39a;
            --dim: oklch(0.72 0.11 155);
            --phosphor: #46ff9c;
            --phosphor: oklch(0.88 0.22 155);
            --phosphor-soft: rgba(70, 255, 156, 0.16);
            --phosphor-soft: oklch(0.88 0.22 155 / 0.16);
            --grid: rgba(70, 255, 156, 0.06);
            --grid: oklch(0.88 0.22 155 / 0.06);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', system-ui, sans-serif;
            height: 100dvh;
            overflow: hidden;
            /* CRT grid background: horizontal + vertical scan lines at 1rem cadence. */
            background-image: linear-gradient(var(--grid) 1px, transparent 1px),
            linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 1rem 1rem, 1rem 1rem;
        }

        canvas#fxCanvas {
            position: fixed;
            inset: 0;
            width: 100dvw;
            height: 100dvh;
            z-index: 1;
            mix-blend-mode: screen;
        }

        .ui {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
        }

        .ui > * {
            pointer-events: auto;
        }

        /* Top bar ─────────────────────────────────── */
        .top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(0.75rem);
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .top h1 {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--phosphor);
            white-space: nowrap;
            letter-spacing: 0.02em;
        }

        .top .sub {
            font-family: 'JetBrains Mono', ui-monospace, monospace;
            font-size: 0.6rem;
            color: var(--dim);
        }

        .hud {
            font-family: 'JetBrains Mono', ui-monospace, monospace;
            font-size: 0.65rem;
            color: var(--dim);
            display: flex;
            gap: 0.9rem;
        }

        .hud .v {
            color: var(--phosphor);
        }

        /* Theme picker ────────────────────────────── */
        .themes {
            display: flex;
            gap: 0.4rem;
            padding: 0.625rem 1rem;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(0.75rem);
            flex-wrap: wrap;
            justify-content: center;
        }

        .theme-btn {
            padding: 0.375rem 0.85rem;
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            background: transparent;
            color: var(--dim);
            font-family: 'JetBrains Mono', ui-monospace, monospace;
            font-size: 0.65rem;
            cursor: pointer;
            transition: color 0.15s, border-color 0.15s, background 0.15s;
            display: flex;
            align-items: center;
            gap: 0.375rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        @media (hover: hover) {
            .theme-btn:hover {
                border-color: var(--phosphor);
                color: var(--text);
            }
        }

        .theme-btn:is(.active) {
            border-color: var(--phosphor);
            color: var(--phosphor);
            background: var(--phosphor-soft);
        }

        /* Control panel ───────────────────────────── */
        .panel {
            position: fixed;
            right: 0;
            top: 0;
            bottom: 0;
            width: 17rem;
            background: var(--panel);
            border-left: 1px solid var(--border);
            backdrop-filter: blur(1rem);
            z-index: 20;
            padding: 5rem 1rem 1rem;
            overflow-y: auto;
            transition: transform 0.25s;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .panel:is(.closed) {
            transform: translateX(100%);
        }

        @media (max-width: 40rem) {
            .panel {
                width: 100dvw;
            }
        }

        .toggle-btn {
            position: fixed;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            z-index: 25;
            width: 1.75rem;
            height: 3.5rem;
            border: 1px solid var(--border);
            border-radius: 0.375rem;
            background: var(--panel);
            color: var(--dim);
            font-size: 0.75rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(0.5rem);
            transition: right 0.25s, color 0.15s;
        }

        @media (hover: hover) {
            .toggle-btn:hover {
                color: var(--phosphor);
            }
        }

        .toggle-btn:is(.shifted) {
            right: 17.75rem;
        }

        @media (max-width: 40rem) {
            .toggle-btn:is(.shifted) {
                right: calc(100dvw + 0.75rem);
            }
        }

        .p-section:not(:last-child) {
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.6rem;
        }

        .p-title {
            font-family: 'JetBrains Mono', ui-monospace, monospace;
            font-size: 0.6rem;
            color: var(--phosphor);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }

        .p-desc {
            font-size: 0.72rem;
            color: var(--dim);
            line-height: 1.5;
        }

        .ctrl {
            display: flex;
            flex-direction: column;
            gap: 0.125rem;
            margin-bottom: 0.4rem;
        }

        .ctrl-head {
            display: flex;
            justify-content: space-between;
            font-family: 'JetBrains Mono', ui-monospace, monospace;
            font-size: 0.6rem;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .ctrl-val {
            color: var(--phosphor);
            min-width: 2.25rem;
            text-align: right;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 3px;
            border-radius: 2px;
            background: var(--phosphor-soft);
            outline: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 0.75rem;
            height: 0.75rem;
            border-radius: 50%;
            background: var(--phosphor);
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 0.75rem;
            height: 0.75rem;
            border-radius: 50%;
            background: var(--phosphor);
            cursor: pointer;
            border: none;
        }

        .badge {
            display: inline-block;
            padding: 0.125rem 0.5rem;
            border: 1px solid var(--border);
            border-radius: 0.25rem;
            font-family: 'JetBrains Mono', ui-monospace, monospace;
            font-size: 0.6rem;
            color: var(--phosphor);
            background: var(--phosphor-soft);
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
<canvas id="fxCanvas"></canvas>

<div class="ui">
    <div class="top">
        <div>
            <h1>@zakkster/lite-ambient-fx</h1>
            <div class="sub">v1.0.0 &middot; zero-dep atmosphere presets</div>
        </div>
        <div class="hud">
            <div>mode: <span class="v" id="hudMode">--</span></div>
            <div>count: <span class="v" id="hudCount">--</span></div>
            <div>fps: <span class="v" id="hudFps">--</span></div>
        </div>
    </div>

    <div class="themes" id="themes"></div>
</div>

<button class="toggle-btn shifted" id="togglePanel" aria-label="Toggle controls" title="Toggle panel">&#9654;</button>

<aside class="panel" id="panel">
    <div class="p-section">
        <div class="p-title">Preset</div>
        <div class="p-desc">
            Six themed presets across four behaviors. Live-tweak with the sliders below;
            switch behavior via a preset. <span class="badge" id="badgeBehavior">--</span>
        </div>
    </div>

    <div class="p-section">
        <div class="p-title">Density &amp; Scale</div>
        <div class="ctrl">
            <div class="ctrl-head"><span>Count</span><span class="ctrl-val" id="vCount">--</span></div>
            <input type="range" id="rCount" min="10" max="500" step="10" value="300">
        </div>
        <div class="ctrl">
            <div class="ctrl-head"><span>Size</span><span class="ctrl-val" id="vSize">--</span></div>
            <input type="range" id="rSize" min="1" max="30" step="1" value="5">
        </div>
        <div class="ctrl">
            <div class="ctrl-head"><span>Alpha</span><span class="ctrl-val" id="vAlpha">--</span></div>
            <input type="range" id="rAlpha" min="0.1" max="1" step="0.05" value="1">
        </div>
    </div>

    <div class="p-section">
        <div class="p-title">Motion</div>
        <div class="ctrl">
            <div class="ctrl-head"><span>Speed</span><span class="ctrl-val" id="vSpeed">--</span></div>
            <input type="range" id="rSpeed" min="0.1" max="5" step="0.1" value="2.5">
        </div>
        <div class="ctrl">
            <div class="ctrl-head"><span>Decay</span><span class="ctrl-val" id="vDecay">--</span></div>
            <input type="range" id="rDecay" min="0.0005" max="0.05" step="0.0005" value="0.004">
        </div>
        <div class="ctrl">
            <div class="ctrl-head"><span>Turb</span><span class="ctrl-val" id="vTurb">--</span></div>
            <input type="range" id="rTurb" min="0" max="2" step="0.1" value="0.5">
        </div>
    </div>

    <div class="p-section">
        <div class="p-title">Wind</div>
        <div class="ctrl">
            <div class="ctrl-head"><span>WindX</span><span class="ctrl-val" id="vWindX">--</span></div>
            <input type="range" id="rWindX" min="-3" max="3" step="0.1" value="-0.2">
        </div>
        <div class="ctrl">
            <div class="ctrl-head"><span>WindY</span><span class="ctrl-val" id="vWindY">--</span></div>
            <input type="range" id="rWindY" min="-3" max="3" step="0.1" value="-0.5">
        </div>
    </div>
</aside>

<script type="importmap">
{
  "imports": {
    "@zakkster/lite-ambient-fx": "../AmbientFX.js"
  }
}

</script>

<script type="module">
  import { createAmbientFX, THEMES, THEME_META, VERSION } from "@zakkster/lite-ambient-fx";

  // ── Cached DOM lookups (all at init) ───────────────────────
  const $canvas = document.getElementById("fxCanvas");
  const $themes = document.getElementById("themes");
  const $panel = document.getElementById("panel");
  const $toggle = document.getElementById("togglePanel");
  const $badgeBehavior = document.getElementById("badgeBehavior");
  const $hudMode = document.getElementById("hudMode");
  const $hudCount = document.getElementById("hudCount");
  const $hudFps = document.getElementById("hudFps");

  const $rCount = document.getElementById("rCount");
  const $rSize = document.getElementById("rSize");
  const $rAlpha = document.getElementById("rAlpha");
  const $rSpeed = document.getElementById("rSpeed");
  const $rDecay = document.getElementById("rDecay");
  const $rTurb = document.getElementById("rTurb");
  const $rWindX = document.getElementById("rWindX");
  const $rWindY = document.getElementById("rWindY");

  const $vCount = document.getElementById("vCount");
  const $vSize = document.getElementById("vSize");
  const $vAlpha = document.getElementById("vAlpha");
  const $vSpeed = document.getElementById("vSpeed");
  const $vDecay = document.getElementById("vDecay");
  const $vTurb = document.getElementById("vTurb");
  const $vWindX = document.getElementById("vWindX");
  const $vWindY = document.getElementById("vWindY");

  // ── Sliders reference table (pre-parsed at init) ───────────
  const SLIDER_TABLE = [
    { el: $rCount, valEl: $vCount, key: "count", fmt: (v) => (v | 0).toString() },
    { el: $rSize, valEl: $vSize, key: "size", fmt: (v) => v.toString() },
    { el: $rAlpha, valEl: $vAlpha, key: "alpha", fmt: (v) => v.toFixed(2) },
    { el: $rSpeed, valEl: $vSpeed, key: "speed", fmt: (v) => v.toString() },
    { el: $rDecay, valEl: $vDecay, key: "decay", fmt: (v) => v.toFixed(4) },
    { el: $rTurb, valEl: $vTurb, key: "turbulence", fmt: (v) => v.toString() },
    { el: $rWindX, valEl: $vWindX, key: "windX", fmt: (v) => v.toString() },
    { el: $rWindY, valEl: $vWindY, key: "windY", fmt: (v) => v.toString() },
  ];

  // ── FX instance ────────────────────────────────────────────
  let currentTheme = "Fire";
  const fx = createAmbientFX($canvas, { theme: currentTheme });

  // ── Theme buttons ──────────────────────────────────────────
  for (let i = 0; i < THEME_META.length; i++) {
    const m = THEME_META[i];
    const btn = document.createElement("button");
    btn.className = "theme-btn" + (m.id === currentTheme ? " active" : "");
    btn.textContent = m.name;
    btn.dataset.theme = m.id;
    $themes.appendChild(btn);
  }

  $themes.addEventListener("click", (ev) => {
    const btn = ev.target.closest(".theme-btn");
    if (btn === null) return;
    switchTheme(btn.dataset.theme);
  });

  function switchTheme(id) {
    if (id === currentTheme) return;
    currentTheme = id;
    fx.setTheme(id);
    // Toggle active class without re-querying siblings.
    const buttons = $themes.children;
    for (let i = 0; i < buttons.length; i++) {
      const b = buttons[i];
      b.classList.toggle("active", b.dataset.theme === id);
    }
    syncSliders();
    syncBadges();
  }

  // ── Slider ranges by behavior ──────────────────────────────
  function adjustSliderRanges(behavior) {
    if (behavior === "MIST") {
      $rSize.min = 50;
      $rSize.max = 500;
      $rSize.step = 10;
      $rAlpha.min = 0.01;
      $rAlpha.max = 0.3;
      $rAlpha.step = 0.005;
      $rDecay.min = 0.0001;
      $rDecay.max = 0.003;
      $rDecay.step = 0.0001;
      $rCount.min = 10;
      $rCount.max = 150;
      $rCount.step = 5;
    } else {
      $rSize.min = 1;
      $rSize.max = 30;
      $rSize.step = 1;
      $rAlpha.min = 0.1;
      $rAlpha.max = 1;
      $rAlpha.step = 0.05;
      $rDecay.min = 0.0005;
      $rDecay.max = 0.05;
      $rDecay.step = 0.0005;
      $rCount.min = 10;
      $rCount.max = 500;
      $rCount.step = 10;
    }
  }

  // ── Slider event handling ──────────────────────────────────
  $panel.addEventListener("input", (ev) => {
    const el = ev.target;
    if (el.tagName !== "INPUT") return;
    const row = SLIDER_TABLE.find((r) => r.el === el);
    if (row === undefined) return;
    const v = parseFloat(el.value);
    row.valEl.textContent = row.fmt(v);
    if (row.key === "windX") fx.updateConfig({ wind: { x: v } });
    else if (row.key === "windY") fx.updateConfig({ wind: { y: v } });
    else fx.updateConfig({ [row.key]: v });
  });

  function syncSliders() {
    const cfg = fx.config;
    adjustSliderRanges(cfg.behavior);
    for (let i = 0; i < SLIDER_TABLE.length; i++) {
      const row = SLIDER_TABLE[i];
      let v;
      if (row.key === "windX") v = cfg.wind.x;
      else if (row.key === "windY") v = cfg.wind.y;
      else v = cfg[row.key];
      row.el.value = v;
      row.valEl.textContent = row.fmt(v);
    }
  }

  function syncBadges() {
    const cfg = fx.config;
    $badgeBehavior.textContent = cfg.behavior;
    $hudMode.textContent = cfg.behavior;
  }

  // ── Panel toggle ───────────────────────────────────────────
  let panelOpen = true;
  $toggle.addEventListener("click", () => {
    panelOpen = !panelOpen;
    $panel.classList.toggle("closed", !panelOpen);
    $toggle.classList.toggle("shifted", panelOpen);
    $toggle.innerHTML = panelOpen ? "&#9654;" : "&#9664;";
  });

  // ── HUD: FPS + count (throttled to ~4Hz to avoid text churn) ──
  let hudFrames = 0;
  let hudLastMs = performance.now();

  function tickHud() {
    hudFrames++;
    const now = performance.now();
    const dt = now - hudLastMs;
    if (dt >= 250) {
      const fps = ((hudFrames * 1000) / dt) | 0;
      $hudFps.textContent = fps.toString();
      $hudCount.textContent = fx.count.toString();
      hudFrames = 0;
      hudLastMs = now;
    }
    requestAnimationFrame(tickHud);
  }

  // ── Boot ───────────────────────────────────────────────────
  syncSliders();
  syncBadges();
  requestAnimationFrame(tickHud);
</script>
</body>
</html>
